<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <style>
    .main-text {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 48px;
      font-weight: 700;
      fill: #1E293B;
      letter-spacing: 2px;
    }
    .sub-text {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 20px;
      font-weight: 400;
      fill: #64748B;
      letter-spacing: 4px;
    }
    .line {
      stroke: #2563EB;
      stroke-width: 4;
    }
  </style>

  <!-- Decorative Line -->
  <line x1="20" y1="90" x2="380" y2="90" class="line"></line>

  <!-- Main Text -->
  <text x="50%" y="55" text-anchor="middle" class="main-text">
    MS &amp; Asoc
  </text>
</svg>
